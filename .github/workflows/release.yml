name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        # `pantry publish --npm` runs the same `bun publish` flow but goes
        # through the pantry CLI for monorepo discovery and `prepublishOnly`
        # handling. NPM_TOKEN is the npm auth token (not the pantry one).
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to Pantry registry
        # Mirrors the npm publish above so installs via `pantry add ts-vat`
        # see the same version. The HTTP-token path keeps this workflow free
        # of AWS credential management — the registry server validates the
        # token and forwards to S3 + DynamoDB.
        run: pantry publish --access public --tag latest
        env:
          PANTRY_REGISTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@v1.2.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
